name: Build and Release

on:
  release:
    types: [published]

jobs:
  # 1. Build the Source Distribution (Platform independent)
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  # 2. Build the Binary Wheels (Platform specific)
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.0
        env:
          # Cython/Numpy needed inside the build environment
          CIBW_BEFORE_BUILD: pip install cython numpy
          CIBW_SKIP: cp36-* cp37-* cp38-*
          CIBW_ARCHS_MACOS: x86_64 arm64

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  # 3. Attach everything to the GitHub Release
  upload_to_release:
    name: Attach Assets to Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cibw-*
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish_pypi:
      name: Publish to PyPI
      needs: [build_wheels, build_sdist]
      runs-on: ubuntu-latest
      environment: pypi
      permissions:
        id-token: write